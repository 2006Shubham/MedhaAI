<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini MCQ Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Gemini MCQ Generator</h1>

        <div id="uploadSection">
            <p>Upload a PDF, PPT, DOC, or TXT file to generate MCQs.</p>
            <input type="file" id="documentUpload" accept=".pdf,.ppt,.pptx,.doc,.docx,.txt">

            <button id="generateMcqsBtn">Generate MCQs</button>
            <p id="message" class="info"></p>
        </div>

        <div id="mcqSection" style="display: none;">
            <h2>Solve the MCQs!</h2>
            <div id="mcqContainer">
            </div>
            <button id="submitMcqsBtn">Submit Answers</button>
            <div id="scoreDisplay" class="score"></div>
            <button id="resetBtn" style="display: none;">Generate New Quiz</button>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
